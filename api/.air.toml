# Air — hot-reload config for Go
# https://github.com/air-verse/air

root = "."
tmp_dir = "tmp"

[build]
  cmd = "go build -o ./tmp/main ./cmd/server"
  bin = "./tmp/main"
  full_bin = "./tmp/main"
  include_ext = ["go", "toml"]
  exclude_dir = ["tmp", "vendor", "db/migrations"]
  delay = 500       # ms to wait before rebuilding after a change
  kill_delay = 200
  log = "build-errors.log"

[log]
  time = true

[color]
  main     = "magenta"
  watcher  = "cyan"
  build    = "yellow"
  runner   = "green"

[misc]
  clean_on_exit = true
