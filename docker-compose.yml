version: "3.9"

services:
  postgres:
    image: postgres:17-alpine
    container_name: financiallife_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "0.0.0.0:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ./api
      dockerfile: Dockerfile.dev
    container_name: financiallife_api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file: .env
    environment:
      DB_HOST: postgres
    ports:
      - "0.0.0.0:8080:8080"
    volumes:
      - ./api:/app
    # Air provides hot-reload; installed inside the container
    command: air -c .air.toml

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile.dev
    container_name: financiallife_web
    restart: unless-stopped
    depends_on:
      - api
    env_file: .env
    environment:
      - VITE_API_URL=http://api:8080
    ports:
      - "0.0.0.0:5173:5173"
    volumes:
      - ./apps/web:/app
      - /app/node_modules   # anonymous volume keeps container node_modules isolated
    command: npm run dev -- --host

volumes:
  postgres_data:
